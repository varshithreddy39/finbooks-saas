<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up – Finbooks</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>body { font-family: 'Inter', sans-serif; } .font-headline { font-family: 'Manrope', sans-serif; }</style>
<link rel="manifest" href="../manifest.json"/>
<meta name="theme-color" content="#0d6e6e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Finbooks"/>
<link rel="apple-touch-icon" href="../icons/icon-192.png"/>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
<div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex min-h-[540px]">
  <!-- Left -->
  <div class="w-2/5 bg-teal-800 p-10 flex flex-col justify-between hidden md:flex">
    <div>
      <div class="flex items-center gap-2.5 mb-10">
        <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-xl">account_balance_wallet</span>
        </div>
        <span class="text-white font-bold text-lg font-headline">Finbooks</span>
      </div>
      <h1 class="text-white text-3xl font-bold font-headline leading-tight mb-3">Set up your<br/>GST account</h1>
      <p class="text-teal-200 text-sm leading-relaxed">Takes 2 minutes. Start generating GST-compliant invoices right away.</p>
    </div>
    <div class="space-y-3">
      <div class="flex items-center gap-2.5 text-teal-200 text-sm"><span class="material-symbols-outlined text-base text-teal-400">check_circle</span>No credit card required</div>
      <div class="flex items-center gap-2.5 text-teal-200 text-sm"><span class="material-symbols-outlined text-base text-teal-400">check_circle</span>Free forever for small businesses</div>
    </div>
  </div>
  <!-- Right -->
  <div class="flex-1 p-10 flex flex-col justify-center">
    <div class="max-w-sm w-full mx-auto">
      <h2 class="text-2xl font-bold text-slate-800 font-headline mb-1">Create account</h2>
      <p class="text-slate-500 text-sm mb-8">Get started with Finbooks</p>
      <form id="signup-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Full Name</label>
          <input type="text" id="full_name" placeholder="Ramesh Kumar" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-700 focus:border-transparent transition"/>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Email Address</label>
            <input type="email" id="email" placeholder="you@company.com" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-700 focus:border-transparent transition"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Mobile Number</label>
            <input type="tel" id="mobile" placeholder="9876543210" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-700 focus:border-transparent transition"/>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Company GSTIN</label>
          <input type="text" id="gstin" placeholder="27AABCU1234F1Z1" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-700 focus:border-transparent transition uppercase"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" required class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-700 focus:border-transparent transition"/>
        </div>
        <button type="submit" id="submit-btn" class="w-full bg-teal-800 hover:bg-teal-900 text-white font-semibold rounded-lg py-3 text-sm transition-colors mt-2">Create Account</button>
      </form>
      <p class="text-center text-sm text-slate-500 mt-6">Already have an account? <a href="../login_page/code.html" class="text-teal-700 font-semibold hover:underline">Sign in</a></p>
    </div>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const originalText = btn.innerText;
  btn.innerText = 'Creating account...';
  btn.disabled = true;

  try {
    const data = {
      full_name: document.getElementById('full_name').value,
      email: document.getElementById('email').value,
      mobile: document.getElementById('mobile').value,
      gstin: document.getElementById('gstin').value.toUpperCase(),
      password: document.getElementById('password').value
    };
    
    await PrecisionApi.auth.signup(data);
    
    // On success, go to login or setup
    alert('Account created! Please log in.');
    window.location = '../login_page/code.html';
  } catch (err) {
    alert('Error: ' + err.message);
    btn.innerText = originalText;
    btn.disabled = false;
  }
});
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('../sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
